<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Paper Reading – AI for Life Sciences</title>
  <link rel="stylesheet" href="assets/css/style.css" />
</head>
<body>
  <header class="site-header">
    <div class="header-inner">
      <div class="header-title">
        <h1>📄 Paper Reading</h1>
        <p class="subtitle">AI for Life Sciences · Drug Discovery · Biological Modeling</p>
      </div>
      <div class="header-search">
        <input
          type="search"
          id="search-input"
          placeholder="Search papers by title or keyword…"
          aria-label="Search papers"
        />
      </div>
    </div>
  </header>

  <div class="layout">
    <!-- Sidebar filters -->
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-section">
        <h2>Venue / Conference</h2>
        <div class="tag-group" id="venue-tags"></div>
      </div>
      <div class="sidebar-section">
        <h2>Year</h2>
        <div class="tag-group" id="year-tags"></div>
      </div>
      <div class="sidebar-section">
        <h2>Topic</h2>
        <div class="tag-group" id="topic-tags"></div>
      </div>
      <button class="clear-btn" id="clear-filters">Clear all filters</button>
    </aside>

    <!-- Main content -->
    <main class="main-content">
      <div class="results-bar">
        <span id="results-count"></span>
        <button class="toggle-sidebar-btn" id="toggle-sidebar" aria-label="Toggle filters">
          <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="4" y1="6" x2="20" y2="6"/><line x1="4" y1="12" x2="20" y2="12"/><line x1="4" y1="18" x2="20" y2="18"/></svg>
          Filters
        </button>
      </div>
      <div class="papers-grid" id="papers-grid"></div>
      <div class="no-results" id="no-results" hidden>
        <p>No papers match your filters. <a href="#" id="reset-link">Clear filters</a></p>
      </div>
    </main>
  </div>

  <footer class="site-footer">
    <p>
      Source: <a href="https://github.com/inoue0426/Paper-reading" target="_blank" rel="noopener">inoue0426/Paper-reading</a>
    </p>
  </footer>

  <script src="assets/js/papers.js"></script>
  <script src="assets/js/app.js"></script>
</body>
</html>
