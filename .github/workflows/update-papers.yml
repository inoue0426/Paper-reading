name: Update papers from issue and deploy GitHub Pages

on:
  issues:
    types: [opened, edited, reopened, closed]

concurrency:
  group: update-papers-${{ github.event.issue.number }}
  cancel-in-progress: false

jobs:
  # ── Job 1: parse issue → update papers.js → push ──────────────────────────
  update-papers:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      changed: ${{ steps.commit.outputs.changed }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Update papers.js from issue body
        env:
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          ISSUE_TITLE:  ${{ github.event.issue.title }}
          ISSUE_BODY:   ${{ github.event.issue.body }}
        run: python scripts/update_papers.py

      - name: Commit and push changes
        id: commit
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add assets/js/papers.js
          if git diff --staged --quiet; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "No changes to commit."
          else
            git commit -m "chore: update papers.js from issue #${{ github.event.issue.number }}"
            git push
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

  # ── Job 2: deploy GitHub Pages (runs whenever papers may have changed) ─────
  deploy:
    needs: update-papers
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout repository (latest)
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.repository.default_branch }}

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
